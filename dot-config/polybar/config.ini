[colors]
background = #181825
background-alt = #373B41
foreground = #cdd6f4
primary = #a6e3a1
secondary = #8ABEB7
alert = #f38ba8
disabled = #45475a

[bar/main]
width = 100%
height = 24pt
radius = 0

dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 4pt

border-size = 0pt
border-color = #00000000

padding = 2
module-margin = 2

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrains Mono Nerd Font Propo:size=12;4"
font-1 = monospace;4

modules-left = xworkspaces
modules-center = date
modules-right = mpd pulseaudio memory cpu eth

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = ""
label-active-background = ${colors.background}
label-active-foreground = ${colors.foreground}
label-active-padding = 1

label-occupied = ""
label-occupied-padding = 1

label-urgent = ""
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = ""
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

[module/mpd]
type = internal/mpd

host = 127.0.0.1
port = 6600

format-playing = "%{A1:mpc toggle:}%{A3:alacritty -e ncmpcpp:}> <label-song>%{A}%{A}"
format-paused = "%{A1:mpc toggle:}%{A3:alacritty -e ncmpcpp:}= <label-song>%{A}%{A}"
format-stopped = ""
label-song-maxlen = 32

label-song = "%artist% - %title%"

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = "%percentage%%"

label-muted = " %percentage%%"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 6
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/eth]
inherit = network-base
interface-type = wired
label-connected-foreground = ${colors.primary}
label-connected = " "
label-disconnected-foreground = ${colors.alert}
label-disconnected = " "
unknown-as-up = false

[module/date]
type = internal/date
interval = 1

date = "%a, %b %d  %R"
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
